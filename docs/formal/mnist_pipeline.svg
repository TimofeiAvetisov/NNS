<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="500" viewBox="0 0 1180 500">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#2563eb"/>
    </marker>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #111827; }
      .label { font: 700 17px Arial, sans-serif; fill: #111827; }
      .small { font: 14px Arial, sans-serif; fill: #374151; }
      .mono { font: 14px Consolas, monospace; fill: #111827; }
      .box { fill: #f9fafb; stroke: #111827; stroke-width: 2; rx: 8; }
      .prep { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 8; }
      .model { fill: #eef2ff; stroke: #3730a3; stroke-width: 2; rx: 8; }
      .metric { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 8; }
      .arrow { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1180" height="500" fill="#ffffff"/>
  <text x="40" y="48" class="title">Эксперимент MNIST: поток данных и вычисление метрик</text>

  <rect x="40" y="112" width="180" height="95" class="box"/>
  <text x="82" y="145" class="label">CSV-файлы</text>
  <text x="70" y="173" class="mono">mnist_train</text>
  <text x="75" y="195" class="mono">mnist_test</text>

  <path d="M 220 160 L 278 160" class="arrow"/>
  <rect x="290" y="112" width="190" height="95" class="prep"/>
  <text x="335" y="145" class="label">load_csv</text>
  <text x="320" y="173" class="small">target column = 0</text>
  <text x="319" y="195" class="mono">X: 784 x N</text>

  <path d="M 480 160 L 538 160" class="arrow"/>
  <rect x="550" y="112" width="190" height="95" class="prep"/>
  <text x="590" y="145" class="label">Preprocess</text>
  <text x="578" y="173" class="mono">x := x / 255</text>
  <text x="581" y="195" class="mono">one-hot(10)</text>

  <path d="M 740 160 L 798 160" class="arrow"/>
  <rect x="810" y="112" width="160" height="95" class="prep"/>
  <text x="847" y="145" class="label">DataLoader</text>
  <text x="841" y="173" class="mono">B = 100</text>
  <text x="835" y="195" class="small">shuffle train</text>

  <path d="M 890 207 C 890 250, 805 258, 750 258 L 705 258" class="arrow"/>
  <rect x="430" y="245" width="275" height="120" class="model"/>
  <text x="485" y="281" class="label">NeuralNetwork</text>
  <text x="470" y="309" class="mono">784 -> 128 -> 64 -> 10</text>
  <text x="470" y="334" class="mono">ReLU, Adam, CrossEntropy</text>

  <path d="M 705 305 L 778 305" class="arrow"/>
  <rect x="790" y="245" width="160" height="120" class="metric"/>
  <text x="840" y="281" class="label">Logits</text>
  <text x="826" y="309" class="mono">10 x B</text>
  <text x="820" y="334" class="small">argmax class</text>

  <path d="M 950 305 L 1008 305" class="arrow"/>
  <rect x="1020" y="245" width="130" height="120" class="metric"/>
  <text x="1047" y="281" class="label">Metrics</text>
  <text x="1038" y="309" class="small">accuracy</text>
  <text x="1038" y="331" class="small">precision</text>
  <text x="1038" y="353" class="small">recall, F1</text>

  <rect x="40" y="405" width="1110" height="50" class="box"/>
  <text x="58" y="436" class="small">Фиксированные параметры запуска: seed = 42, batch size = 100, epochs = 10, optimizer = Adam(ConstantLR(0.001)), loss = CrossEntropyLoss.</text>
</svg>
