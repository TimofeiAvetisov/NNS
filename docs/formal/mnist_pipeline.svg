<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#2563eb"/>
    </marker>
    <style>
      .title{font:700 26px Arial,sans-serif;fill:#111827}
      .h{font:700 17px Arial,sans-serif;fill:#111827}
      .t{font:14px Arial,sans-serif;fill:#374151}
      .m{font:14px Consolas,monospace;fill:#111827}
      .box{fill:#f9fafb;stroke:#111827;stroke-width:2;rx:10}
      .prep{fill:#ecfdf5;stroke:#047857;stroke-width:2;rx:10}
      .model{fill:#eef2ff;stroke:#3730a3;stroke-width:2;rx:10}
      .metric{fill:#fff7ed;stroke:#c2410c;stroke-width:2;rx:10}
      .a{stroke:#2563eb;stroke-width:2.8;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>

  <rect width="1200" height="560" fill="#ffffff"/>
  <text x="50" y="52" class="title">Эксперимент MNIST</text>

  <rect x="40" y="120" width="160" height="98" class="box"/>
  <text x="120" y="155" text-anchor="middle" class="h">CSV</text>
  <text x="120" y="182" text-anchor="middle" class="m">train/test</text>
  <text x="120" y="205" text-anchor="middle" class="t">label + 784 px</text>

  <rect x="260" y="120" width="170" height="98" class="prep"/>
  <text x="345" y="155" text-anchor="middle" class="h">load_csv</text>
  <text x="345" y="182" text-anchor="middle" class="m">target={0}</text>
  <text x="345" y="205" text-anchor="middle" class="m">X: 784 x N</text>

  <rect x="490" y="120" width="170" height="98" class="prep"/>
  <text x="575" y="155" text-anchor="middle" class="h">Preprocess</text>
  <text x="575" y="182" text-anchor="middle" class="m">x / 255</text>
  <text x="575" y="205" text-anchor="middle" class="m">one-hot(10)</text>

  <rect x="720" y="120" width="170" height="98" class="prep"/>
  <text x="805" y="155" text-anchor="middle" class="h">DataLoader</text>
  <text x="805" y="182" text-anchor="middle" class="m">B = 100</text>
  <text x="805" y="205" text-anchor="middle" class="t">shuffle train</text>

  <rect x="950" y="120" width="190" height="98" class="model"/>
  <text x="1045" y="155" text-anchor="middle" class="h">Trainer</text>
  <text x="1045" y="182" text-anchor="middle" class="m">10 epochs</text>
  <text x="1045" y="205" text-anchor="middle" class="m">seed = 42</text>

  <path d="M200 169 H260" class="a"/>
  <path d="M430 169 H490" class="a"/>
  <path d="M660 169 H720" class="a"/>
  <path d="M890 169 H950" class="a"/>

  <rect x="160" y="335" width="260" height="110" class="model"/>
  <text x="290" y="372" text-anchor="middle" class="h">NeuralNetwork</text>
  <text x="290" y="400" text-anchor="middle" class="m">784 -> 128 -> 64 -> 10</text>
  <text x="290" y="425" text-anchor="middle" class="m">ReLU, logits</text>

  <rect x="500" y="335" width="220" height="110" class="metric"/>
  <text x="610" y="372" text-anchor="middle" class="h">Optimization</text>
  <text x="610" y="400" text-anchor="middle" class="m">Adam, lr = 0.001</text>
  <text x="610" y="425" text-anchor="middle" class="m">CrossEntropyLoss</text>

  <rect x="800" y="335" width="240" height="110" class="metric"/>
  <text x="920" y="372" text-anchor="middle" class="h">Evaluation</text>
  <text x="920" y="400" text-anchor="middle" class="m">accuracy = 0.9751</text>
  <text x="920" y="425" text-anchor="middle" class="m">macro F1 = 0.9749</text>

  <path d="M1045 218 V275 H290 V335" class="a"/>
  <path d="M420 390 H500" class="a"/>
  <path d="M720 390 H800" class="a"/>

  <rect x="40" y="492" width="1100" height="40" class="box"/>
  <text x="60" y="518" class="t">
    Метрики считаются на тестовой выборке: argmax(logits), confusion matrix, precision, recall, F1.
  </text>
</svg>
