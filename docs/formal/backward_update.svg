<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="560" viewBox="0 0 1180 560">
  <defs>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#dc2626"/>
    </marker>
    <marker id="arrow-purple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#059669"/>
    </marker>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #111827; }
      .label { font: 600 17px Arial, sans-serif; fill: #111827; }
      .small { font: 14px Arial, sans-serif; fill: #374151; }
      .mono { font: 14px Consolas, monospace; fill: #111827; }
      .loss { fill: #fef2f2; stroke: #b91c1c; stroke-width: 2; rx: 8; }
      .layer { fill: #eef2ff; stroke: #3730a3; stroke-width: 2; rx: 8; }
      .grad { fill: #f5f3ff; stroke: #6d28d9; stroke-width: 2; rx: 8; }
      .opt { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 8; }
      .red { stroke: #dc2626; stroke-width: 3; fill: none; marker-end: url(#arrow-red); }
      .purple { stroke: #7c3aed; stroke-width: 3; fill: none; marker-end: url(#arrow-purple); stroke-dasharray: 8 6; }
      .green { stroke: #059669; stroke-width: 3; fill: none; marker-end: url(#arrow-green); }
      .note { fill: #f9fafb; stroke: #111827; stroke-width: 1.8; rx: 6; }
    </style>
  </defs>

  <rect x="0" y="0" width="1180" height="560" fill="#ffffff"/>
  <text x="40" y="48" class="title">Обратный проход и обновление параметров</text>

  <rect x="40" y="112" width="170" height="92" class="loss"/>
  <text x="77" y="145" class="label">Loss</text>
  <text x="64" y="172" class="mono">gradient()</text>
  <text x="64" y="196" class="mono">dL/dY_hat</text>

  <path d="M 210 158 L 278 158" class="red"/>
  <rect x="290" y="112" width="160" height="92" class="layer"/>
  <text x="325" y="145" class="label">Layer 4</text>
  <text x="317" y="172" class="mono">backward</text>
  <text x="317" y="196" class="small">cache[4]</text>

  <path d="M 450 158 L 518 158" class="red"/>
  <rect x="530" y="112" width="160" height="92" class="layer"/>
  <text x="565" y="145" class="label">Layer 3</text>
  <text x="557" y="172" class="mono">backward</text>
  <text x="557" y="196" class="small">cache[3]</text>

  <path d="M 690 158 L 758 158" class="red"/>
  <rect x="770" y="112" width="160" height="92" class="layer"/>
  <text x="805" y="145" class="label">Layer 2</text>
  <text x="797" y="172" class="mono">backward</text>
  <text x="797" y="196" class="small">cache[2]</text>

  <path d="M 930 158 L 998 158" class="red"/>
  <rect x="1010" y="112" width="130" height="92" class="layer"/>
  <text x="1046" y="145" class="label">...</text>
  <text x="1035" y="172" class="small">до входа</text>

  <rect x="290" y="286" width="160" height="98" class="grad"/>
  <text x="329" y="318" class="label">Grad[4]</text>
  <text x="315" y="347" class="mono">dA, db</text>
  <text x="314" y="371" class="small">если слой Linear</text>

  <rect x="530" y="286" width="160" height="98" class="grad"/>
  <text x="569" y="318" class="label">Grad[3]</text>
  <text x="554" y="347" class="small">пустой grad</text>
  <text x="557" y="371" class="small">для Activation</text>

  <rect x="770" y="286" width="160" height="98" class="grad"/>
  <text x="809" y="318" class="label">Grad[2]</text>
  <text x="795" y="347" class="mono">dA, db</text>
  <text x="796" y="371" class="small">если слой Linear</text>

  <path d="M 370 204 L 370 274" class="purple"/>
  <path d="M 610 204 L 610 274" class="purple"/>
  <path d="M 850 204 L 850 274" class="purple"/>

  <rect x="220" y="442" width="230" height="78" class="opt"/>
  <text x="260" y="474" class="label">Optimizer</text>
  <text x="246" y="501" class="mono">SGD / Adam</text>

  <rect x="520" y="442" width="230" height="78" class="opt"/>
  <text x="570" y="474" class="label">Parameters</text>
  <text x="553" y="501" class="mono">A := update(A)</text>

  <rect x="820" y="442" width="230" height="78" class="opt"/>
  <text x="870" y="474" class="label">Opt cache</text>
  <text x="848" y="501" class="mono">m, v для Adam</text>

  <path d="M 370 384 C 370 415, 335 413, 335 430" class="green"/>
  <path d="M 850 384 C 850 420, 720 420, 635 430" class="green"/>
  <path d="M 450 481 L 508 481" class="green"/>
  <path d="M 750 481 L 808 481" class="green"/>

  <rect x="40" y="246" width="170" height="86" class="note"/>
  <text x="61" y="276" class="label">Порядок</text>
  <text x="60" y="303" class="small">backward: справа налево</text>
  <text x="60" y="325" class="small">update: слева направо</text>
</svg>
