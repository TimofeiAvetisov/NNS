<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640">
  <defs>
    <marker id="red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#dc2626"/>
    </marker>
    <marker id="violet" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#7c3aed"/>
    </marker>
    <marker id="green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#059669"/>
    </marker>
    <style>
      .title{font:700 26px Arial,sans-serif;fill:#111827}
      .h{font:700 17px Arial,sans-serif;fill:#111827}
      .t{font:14px Arial,sans-serif;fill:#374151}
      .m{font:14px Consolas,monospace;fill:#111827}
      .loss{fill:#fef2f2;stroke:#b91c1c;stroke-width:2;rx:10}
      .layer{fill:#eef2ff;stroke:#3730a3;stroke-width:2;rx:10}
      .grad{fill:#f5f3ff;stroke:#6d28d9;stroke-width:2;rx:10}
      .opt{fill:#ecfdf5;stroke:#047857;stroke-width:2;rx:10}
      .note{fill:#f9fafb;stroke:#111827;stroke-width:2;rx:8}
      .r{stroke:#dc2626;stroke-width:2.8;fill:none;marker-end:url(#red)}
      .v{stroke:#7c3aed;stroke-width:2.4;fill:none;stroke-dasharray:7 6;marker-end:url(#violet)}
      .g{stroke:#059669;stroke-width:2.6;fill:none;marker-end:url(#green)}
    </style>
  </defs>

  <rect width="1200" height="640" fill="#ffffff"/>
  <text x="50" y="52" class="title">Обратный проход и обновление параметров</text>

  <rect x="980" y="115" width="170" height="100" class="loss"/>
  <text x="1065" y="150" text-anchor="middle" class="h">Loss gradient</text>
  <text x="1065" y="178" text-anchor="middle" class="m">dL/dY_hat</text>

  <rect x="750" y="115" width="160" height="100" class="layer"/>
  <text x="830" y="150" text-anchor="middle" class="h">Layer 4</text>
  <text x="830" y="178" text-anchor="middle" class="m">backward</text>
  <text x="830" y="202" text-anchor="middle" class="t">cache[4]</text>

  <rect x="525" y="115" width="160" height="100" class="layer"/>
  <text x="605" y="150" text-anchor="middle" class="h">Layer 3</text>
  <text x="605" y="178" text-anchor="middle" class="m">backward</text>
  <text x="605" y="202" text-anchor="middle" class="t">cache[3]</text>

  <rect x="300" y="115" width="160" height="100" class="layer"/>
  <text x="380" y="150" text-anchor="middle" class="h">Layer 2</text>
  <text x="380" y="178" text-anchor="middle" class="m">backward</text>
  <text x="380" y="202" text-anchor="middle" class="t">cache[2]</text>

  <rect x="70" y="115" width="160" height="100" class="layer"/>
  <text x="150" y="150" text-anchor="middle" class="h">Layer 1</text>
  <text x="150" y="178" text-anchor="middle" class="m">backward</text>
  <text x="150" y="202" text-anchor="middle" class="t">cache[1]</text>

  <path d="M980 165 H910" class="r"/>
  <path d="M750 165 H685" class="r"/>
  <path d="M525 165 H460" class="r"/>
  <path d="M300 165 H230" class="r"/>

  <rect x="750" y="310" width="160" height="92" class="grad"/>
  <text x="830" y="343" text-anchor="middle" class="h">grad[4]</text>
  <text x="830" y="370" text-anchor="middle" class="m">dA, db</text>

  <rect x="525" y="310" width="160" height="92" class="grad"/>
  <text x="605" y="343" text-anchor="middle" class="h">grad[3]</text>
  <text x="605" y="370" text-anchor="middle" class="t">empty for ReLU</text>

  <rect x="300" y="310" width="160" height="92" class="grad"/>
  <text x="380" y="343" text-anchor="middle" class="h">grad[2]</text>
  <text x="380" y="370" text-anchor="middle" class="m">dA, db</text>

  <rect x="70" y="310" width="160" height="92" class="grad"/>
  <text x="150" y="343" text-anchor="middle" class="h">grad[1]</text>
  <text x="150" y="370" text-anchor="middle" class="t">empty for ReLU</text>

  <path d="M830 215 V310" class="v"/>
  <path d="M605 215 V310" class="v"/>
  <path d="M380 215 V310" class="v"/>
  <path d="M150 215 V310" class="v"/>

  <rect x="250" y="490" width="200" height="88" class="opt"/>
  <text x="350" y="524" text-anchor="middle" class="h">Optimizer</text>
  <text x="350" y="552" text-anchor="middle" class="m">SGD / Adam</text>

  <rect x="500" y="490" width="200" height="88" class="opt"/>
  <text x="600" y="524" text-anchor="middle" class="h">Parameters</text>
  <text x="600" y="552" text-anchor="middle" class="m">A, b</text>

  <rect x="750" y="490" width="200" height="88" class="opt"/>
  <text x="850" y="524" text-anchor="middle" class="h">Opt cache</text>
  <text x="850" y="552" text-anchor="middle" class="m">m, v for Adam</text>

  <path d="M380 402 V450 H350 V490" class="g"/>
  <path d="M830 402 V450 H600 V490" class="g"/>
  <path d="M450 534 H500" class="g"/>
  <path d="M700 534 H750" class="g"/>

  <rect x="70" y="490" width="130" height="88" class="note"/>
  <text x="135" y="523" text-anchor="middle" class="h">Порядок</text>
  <text x="135" y="551" text-anchor="middle" class="t">backward: справа</text>
  <text x="135" y="571" text-anchor="middle" class="t">update: слева</text>
</svg>
