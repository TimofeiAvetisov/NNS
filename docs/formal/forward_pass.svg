<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <defs>
    <marker id="blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#2563eb"/>
    </marker>
    <marker id="green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#059669"/>
    </marker>
    <style>
      .title{font:700 26px Arial,sans-serif;fill:#111827}
      .h{font:700 17px Arial,sans-serif;fill:#111827}
      .t{font:14px Arial,sans-serif;fill:#374151}
      .m{font:14px Consolas,monospace;fill:#111827}
      .box{fill:#f9fafb;stroke:#111827;stroke-width:2;rx:10}
      .layer{fill:#eef2ff;stroke:#3730a3;stroke-width:2;rx:10}
      .cache{fill:#ecfdf5;stroke:#047857;stroke-width:2;rx:10}
      .note{fill:#fff7ed;stroke:#c2410c;stroke-width:2;rx:8}
      .a{stroke:#2563eb;stroke-width:2.8;fill:none;marker-end:url(#blue)}
      .c{stroke:#059669;stroke-width:2.4;fill:none;stroke-dasharray:7 6;marker-end:url(#green)}
    </style>
  </defs>

  <rect width="1200" height="620" fill="#ffffff"/>
  <text x="50" y="52" class="title">Прямой проход и формирование кэшей</text>

  <rect x="40" y="135" width="135" height="90" class="box"/>
  <text x="108" y="169" text-anchor="middle" class="h">Input</text>
  <text x="108" y="196" text-anchor="middle" class="m">X</text>
  <text x="108" y="216" text-anchor="middle" class="m">784 x B</text>

  <rect x="230" y="120" width="145" height="120" class="layer"/>
  <text x="303" y="154" text-anchor="middle" class="h">Linear</text>
  <text x="303" y="181" text-anchor="middle" class="m">A X + b</text>
  <text x="303" y="207" text-anchor="middle" class="m">784 -> 128</text>

  <rect x="430" y="120" width="145" height="120" class="layer"/>
  <text x="503" y="154" text-anchor="middle" class="h">ReLU</text>
  <text x="503" y="181" text-anchor="middle" class="m">max(0,x)</text>
  <text x="503" y="207" text-anchor="middle" class="m">128 x B</text>

  <rect x="630" y="120" width="145" height="120" class="layer"/>
  <text x="703" y="154" text-anchor="middle" class="h">Linear</text>
  <text x="703" y="181" text-anchor="middle" class="m">A X + b</text>
  <text x="703" y="207" text-anchor="middle" class="m">128 -> 64</text>

  <rect x="830" y="120" width="145" height="120" class="layer"/>
  <text x="903" y="154" text-anchor="middle" class="h">ReLU</text>
  <text x="903" y="181" text-anchor="middle" class="m">max(0,x)</text>
  <text x="903" y="207" text-anchor="middle" class="m">64 x B</text>

  <rect x="1030" y="120" width="145" height="120" class="layer"/>
  <text x="1103" y="154" text-anchor="middle" class="h">Linear</text>
  <text x="1103" y="181" text-anchor="middle" class="m">A X + b</text>
  <text x="1103" y="207" text-anchor="middle" class="m">64 -> 10</text>

  <path d="M175 180 H230" class="a"/>
  <path d="M375 180 H430" class="a"/>
  <path d="M575 180 H630" class="a"/>
  <path d="M775 180 H830" class="a"/>
  <path d="M975 180 H1030" class="a"/>

  <rect x="1010" y="315" width="165" height="90" class="box"/>
  <text x="1093" y="349" text-anchor="middle" class="h">Output</text>
  <text x="1093" y="376" text-anchor="middle" class="m">logits</text>
  <text x="1093" y="397" text-anchor="middle" class="m">10 x B</text>
  <path d="M1103 240 V315" class="a"/>

  <rect x="230" y="335" width="145" height="100" class="cache"/>
  <text x="303" y="368" text-anchor="middle" class="h">cache[0]</text>
  <text x="303" y="394" text-anchor="middle" class="t">input X</text>
  <text x="303" y="417" text-anchor="middle" class="m">784 x B</text>

  <rect x="430" y="335" width="145" height="100" class="cache"/>
  <text x="503" y="368" text-anchor="middle" class="h">cache[1]</text>
  <text x="503" y="394" text-anchor="middle" class="t">input ReLU</text>
  <text x="503" y="417" text-anchor="middle" class="m">128 x B</text>

  <rect x="630" y="335" width="145" height="100" class="cache"/>
  <text x="703" y="368" text-anchor="middle" class="h">cache[2]</text>
  <text x="703" y="394" text-anchor="middle" class="t">input X</text>
  <text x="703" y="417" text-anchor="middle" class="m">128 x B</text>

  <rect x="830" y="335" width="145" height="100" class="cache"/>
  <text x="903" y="368" text-anchor="middle" class="h">cache[3]</text>
  <text x="903" y="394" text-anchor="middle" class="t">input ReLU</text>
  <text x="903" y="417" text-anchor="middle" class="m">64 x B</text>

  <path d="M303 240 V335" class="c"/>
  <path d="M503 240 V335" class="c"/>
  <path d="M703 240 V335" class="c"/>
  <path d="M903 240 V335" class="c"/>

  <rect x="40" y="510" width="1135" height="52" class="note"/>
  <text x="60" y="542" class="t">
    forward возвращает пару: выходная матрица и std::vector&lt;std::any&gt; с локальными кэшами слоев.
  </text>
</svg>
