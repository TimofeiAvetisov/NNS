<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#1f2937"/>
    </marker>
    <style>
      .title{font:700 26px Arial,sans-serif;fill:#111827}
      .h{font:700 18px Arial,sans-serif;fill:#111827}
      .t{font:14px Arial,sans-serif;fill:#374151}
      .m{font:14px Consolas,monospace;fill:#111827}
      .data{fill:#ecfdf5;stroke:#047857;stroke-width:2;rx:10}
      .core{fill:#eff6ff;stroke:#1d4ed8;stroke-width:2;rx:10}
      .algo{fill:#fff7ed;stroke:#c2410c;stroke-width:2;rx:10}
      .iface{fill:#f5f3ff;stroke:#6d28d9;stroke-width:2;rx:10}
      .a{stroke:#1f2937;stroke-width:2.4;fill:none;marker-end:url(#arrow)}
      .d{stroke:#6b7280;stroke-width:2;fill:none;stroke-dasharray:7 6;marker-end:url(#arrow)}
    </style>
  </defs>

  <rect width="1200" height="640" fill="#ffffff"/>
  <text x="50" y="52" class="title">Компонентная архитектура NNS</text>

  <rect x="470" y="90" width="260" height="88" class="core"/>
  <text x="600" y="124" text-anchor="middle" class="h">Trainer</text>
  <text x="600" y="151" text-anchor="middle" class="m">fit(), fit_epoch()</text>

  <rect x="70" y="255" width="220" height="100" class="data"/>
  <text x="180" y="292" text-anchor="middle" class="h">DataLoader</text>
  <text x="180" y="319" text-anchor="middle" class="m">Batch {X, Y}</text>
  <text x="180" y="342" text-anchor="middle" class="t">полные батчи, shuffle</text>

  <rect x="360" y="255" width="260" height="100" class="core"/>
  <text x="490" y="292" text-anchor="middle" class="h">NeuralNetwork</text>
  <text x="490" y="319" text-anchor="middle" class="m">predict / forward</text>
  <text x="490" y="342" text-anchor="middle" class="m">backward / update</text>

  <rect x="700" y="255" width="200" height="100" class="algo"/>
  <text x="800" y="292" text-anchor="middle" class="h">Loss</text>
  <text x="800" y="319" text-anchor="middle" class="m">loss()</text>
  <text x="800" y="342" text-anchor="middle" class="m">gradient()</text>

  <rect x="970" y="255" width="180" height="100" class="algo"/>
  <text x="1060" y="292" text-anchor="middle" class="h">Optimizer</text>
  <text x="1060" y="319" text-anchor="middle" class="m">SGD / Adam</text>
  <text x="1060" y="342" text-anchor="middle" class="t">обновление параметров</text>

  <rect x="70" y="470" width="220" height="92" class="data"/>
  <text x="180" y="505" text-anchor="middle" class="h">load_csv / Matrix</text>
  <text x="180" y="532" text-anchor="middle" class="m">X: features x N</text>

  <rect x="360" y="470" width="260" height="92" class="iface"/>
  <text x="490" y="505" text-anchor="middle" class="h">AnyLayer</text>
  <text x="490" y="532" text-anchor="middle" class="m">proxy facade</text>

  <rect x="700" y="470" width="200" height="92" class="iface"/>
  <text x="800" y="505" text-anchor="middle" class="h">AnyLossFunction</text>
  <text x="800" y="532" text-anchor="middle" class="m">proxy facade</text>

  <rect x="970" y="470" width="180" height="92" class="iface"/>
  <text x="1060" y="505" text-anchor="middle" class="h">AnyOptimizer</text>
  <text x="1060" y="532" text-anchor="middle" class="m">AnyLearningRate</text>

  <path d="M600 178 V215 H180 V255" class="a"/>
  <path d="M600 178 V215 H490 V255" class="a"/>
  <path d="M600 178 V215 H800 V255" class="a"/>
  <path d="M600 178 V215 H1060 V255" class="a"/>

  <path d="M290 305 H360" class="a"/>
  <path d="M620 305 H700" class="a"/>
  <path d="M900 305 H970" class="a"/>

  <path d="M180 470 V355" class="d"/>
  <path d="M490 470 V355" class="d"/>
  <path d="M800 470 V355" class="d"/>
  <path d="M1060 470 V355" class="d"/>

  <text x="50" y="608" class="t">
    Сплошные стрелки показывают поток вызовов и данных, пунктирные стрелки — type-erased интерфейсы.
  </text>
</svg>
